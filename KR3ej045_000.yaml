body:
  text: 小兒科色小兒鼻之上眼之中色紅者心熱也紅筋橫直現於山根皆心熱也色紫者心熱之甚而肺亦熱也色青者肝有風也青筋橫直現者肝熱也直者風上行橫者風下行也色黑者風甚而腎中有寒也色白者肺中有痰黃者脾胃虛而作瀉一觀其色而疾可知矣脈大人看脈於寸關尺小兒不然但看其數不數而已數甚則熱不數則寒也數之中浮者風也沉者寒也緩者濕也澀者邪也滑者痰也有止歇者痛也如此而已余不必過談也三關小兒虎口風氣命三關紫屬熱紅屬寒青屬驚風白屬疳風關輕氣為重若至命關則難治矣不食乳小兒不食乳心熱也蔥煎乳汁令小兒服之亦妙不若用黃連三分煎湯一分灌數次即食矣神效臍不於用車前子炒焦為細末敷之即干山根山根之上有青筋直觀者乃肝熱也方用柴胡半夏各三分白芍茯苓各一錢當歸白朮各五分山楂三個甘草一分水煎服有青筋橫現者亦肝熱也方用茯苓一錢山楂三個甘草一分水煎服有紅筋直現者心熱也亦用前方加黃連一分麥冬五分去半夏加桑白皮天花粉各二分水煎服有紅筋斜現者亦心熱也亦用前方加黃連二分熱積於胸中不可用半夏用桑白皮花粉可也有黃筋現於山根者不論橫直總是脾胃之證或吐或瀉腹痛或不思食方用白朮茯苓各五分陳皮人參麥芽各二分神麯甘草各一分淡竹葉七分水煎服有痰加半夏一分白芥子二分如口渴有熱者加麥冬三分黃芩一分有寒加乾薑一分吐加白蔻一粒瀉加豬苓五分腹痛按之大叫者食也加大黃三分枳實一分按之不呼號者寒也加乾薑三分如身發熱者不可用此方發熱不拘早晚發熱者俱用萬全湯神效柴胡白朮黃芩神麯各三分白芍麥冬各一錢當歸五分茯苓二錢甘草蘇葉各一錢山楂三個水煎服冬加麻黃一分夏加石膏三分春加青蒿三分秋加桔梗三分有食加枳殼三分有痰加白芥子三分吐加白蔻一粒瀉加豬苓一錢小兒諸證不過如此不可作驚風治之如果有驚風加人參五分其效如神凡潮熱積熱瘧乃脾積寒熱俱用薑梨引柴胡人參黃芩前胡秦艽甘草青蒿各一分童便浸曬於生地一寸薄荷二葉或生梨生藕一片水煎服甚效感冒風寒方用柴胡五分白朮白芍各一錢茯苓半夏各三分陳皮二分炙草四分當歸八分水煎熱服驚風世人動曰驚風誰知小兒驚則有之而風則無小兒純陽之體不當有風而狀有風者蓋小兒陽旺內熱內熱則生風是非外來之風乃內出之風也內風作外風治是速之死也方用清火散風湯白朮梔子各三分茯苓二錢陳皮甘草半夏各一分白芍一錢柴胡五分水煎服此方健脾平肝之聖藥肝平則火散脾健則風止斷不可以風藥表散之也驚風凡驚風皆由於氣虛方用壓風湯人參白朮神麯各五分甘草半夏丹砂各三分茯神一錢砂仁一粒陳皮一分水煎服治慢驚風加黃耆痢疾方用當歸白芍各一錢黃連二分枳殼檳榔各五分甘草三分水煎溫服紅痢倍黃連白痢加澤瀉三分腹痛倍甘草加白芍小便赤加木通三分下如豆汁加白朮一錢傷食加山楂麥芽各三分氣虛加人參三分泄瀉身熱如火口渴舌燥喜冷飲而不喜熱湯方用瀉火止瀉湯車前子二錢茯苓白芍麥芽各一錢黃連豬苓各三分澤瀉五分枳殼二分水煎服寒瀉此證必腹痛而喜手按摩口不渴而舌滑喜熱飲而不喜冷水也方用散寒止瀉湯人參白朮各一錢茯苓二錢肉桂乾薑各二分甘草一分砂仁一粒神麯五分水煎服吐此症雖胃氣之弱亦脾氣之虛小兒恣意飽食不能消化久之上衝於胃口而吐也方用止吐速效湯人參白朮各一錢砂仁一粒茯苓二錢陳皮二分半夏乾薑各一分麥芽五分山楂三個水煎服咳嗽方用蘇葉五分桔梗甘草各一錢水煎熱服有痰加白芥子五分便是疳症此症熱而因乎心熱也遂至口中流涎若不平其心火則脾火更旺濕熱上蒸而口涎不能止方用蘆薈桑白皮各一錢半夏黃連薄荷各三分茯苓二錢甘草一分水煎服此心脾兩清之聖藥也引火下行而府自去矣口疳流水口爛神方黃柏二錢人參一錢共為細末敷口內一日三次即愈此方用黃柏去火人參健脾大人用之亦效疳症瀉痢眼障神效方石決明一兩醋煅蘆薈川芎白蒺黎胡黃連五靈脂細辛穀精草各五錢甘草三錢菊花四錢豬苓去筋搗爛為丸如米大每服二十五丸不拘時米湯下瘧疾方用柴胡六分白朮茯苓歸身各一錢白芍錢半半夏青皮厚朴各五分水煎成露一宿再溫與服熱多者加人參黃耆各五分寒多者加乾薑三分痰多者加白芥子一錢夜熱加何首烏熟地各二錢日發者不用加腹痛加檳榔三分便蟲方用棐子五個去殼甘草三分米飯為丸服二次則蟲化為水矣積蟲方用使君子十個去殼炒檳榔甘草各一錢棐子十個去殼米飯為丸如桐子大每服十丸二日蟲出五日痊愈痘症回毒或疔腫方銀花五錢甘草元參各一錢人參二錢水煎服痘瘡壞症已黑痘瘡壞症已黑者人將棄之藥下喉即活方用人參三錢陳皮荊芥各一錢蟬蛻五分元參當歸各二錢水煎服此乃元氣虛而火不能發也故用人參以補元氣元參去浮游之火陳皮去痰開胃則參無礙而相得益彰荊芥以發之又能引火歸經當歸生新去舊消瘀血蟬蛻解毒除風世人何知此妙法初起時不可服必壞證乃可服急慢風三六九日一切風急慢風三六九日一切風俱治陳膽星雄黃硃砂人參茯苓天竺黃鉤藤牛黃麝香川鬱金柴胡青皮甘草共為細末煎膏為丸如豌豆大真金一張為衣陰乾勿泄氣薄荷湯磨服治火丹神方絲瓜子一兩柴胡升麻各一錢當歸五錢元參一兩水煎服此方詳火症門小兒用之亦效故又出之又方升麻青蒿黃耆各三錢元參一兩乾葛三兩水煎服此二方妙在用青蒿肝胃之火俱平又佐以群藥重劑而火安有不減者乎
